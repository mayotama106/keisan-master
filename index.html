<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="description" content="隙間時間に四則演算と％計算を鍛えるオフライン計算ドリル" />
  <title>めざせ、計算マスター！</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="計算マスター" />

  <!-- Fonts (graceful fallback to system fonts offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <!-- toast / overlay layer -->
  <div id="overlay-root"></div>

  <!-- Logic modules (classic scripts, load order matters) -->
  <script src="./js/storage.js"></script>
  <script src="./js/generator.js"></script>
  <script src="./js/xp.js"></script>
  <script src="./js/sound.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/tutor.js"></script>
  <script src="./js/llm.js"></script>
  <script src="./js/app.js"></script>

  <script>
    // Register service worker for offline / installability (only over http/https).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (e) {
          console.warn('SW registration failed', e);
        });
      });
    }
  </script>
</body>
</html>
